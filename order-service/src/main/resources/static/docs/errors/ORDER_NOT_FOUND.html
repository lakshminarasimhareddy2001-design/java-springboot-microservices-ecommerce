<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ORDER_NOT_FOUND</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; }
        h1 { color: #c00; }
        code { background-color: #f2f2f2; padding: 2px 6px; border-radius: 4px; }
    </style>
</head>
<body>
<h1>ORDER_NOT_FOUND</h1>
<p>The requested order could not be found.</p>
<p>Possible causes:</p>
<ul>
    <li>Invalid order ID</li>
    <li>Order has been deleted</li>
    <li>Typo in the request</li>
</ul>
<p>HTTP Status: <code>404 NOT FOUND</code></p>
</body>
</html>
