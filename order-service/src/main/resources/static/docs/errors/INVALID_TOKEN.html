<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>INVALID_TOKEN</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; }
        h1 { color: #c00; }
        code { background-color: #f2f2f2; padding: 2px 6px; border-radius: 4px; }
    </style>
</head>
<body>
<h1>INVALID_TOKEN</h1>
<p>The provided JWT token is invalid or expired.</p>
<p>Possible solutions:</p>
<ul>
    <li>Check the Authorization header format: <code>Bearer &lt;token&gt;</code></li>
    <li>Request a new token from the authentication service</li>
</ul>
<p>HTTP Status: <code>401 UNAUTHORIZED</code></p>
</body>
</html>
