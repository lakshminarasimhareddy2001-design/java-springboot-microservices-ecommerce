<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>INVALID_USER_ID</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; line-height: 1.6; }
        h1 { color: #c00; }
        code { background-color: #f2f2f2; padding: 2px 6px; border-radius: 4px; }
        ul { margin-left: 20px; }
    </style>
</head>
<body>
<h1>INVALID_USER_ID</h1>
<p>The user ID provided in the request is invalid or malformed.</p>
<p>Possible causes:</p>
<ul>
    <li>The user ID does not conform to UUID format</li>
    <li>The user ID does not exist in the system</li>
    <li>Incorrectly formatted request</li>
</ul>
<p>HTTP Status: <code>400 BAD REQUEST</code></p>
</body>
</html>
