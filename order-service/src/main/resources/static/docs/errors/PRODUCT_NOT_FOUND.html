<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>PRODUCT_NOT_FOUND</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; line-height: 1.6; }
        h1 { color: #c00; }
        code { background-color: #f2f2f2; padding: 2px 6px; border-radius: 4px; }
        ul { margin-left: 20px; }
    </style>
</head>
<body>
<h1>PRODUCT_NOT_FOUND</h1>
<p>The requested product could not be found in the system.</p>
<p>Possible causes:</p>
<ul>
    <li>Invalid product ID</li>
    <li>Product has been removed or is unavailable</li>
    <li>Typo in the request</li>
</ul>
<p>HTTP Status: <code>404 NOT FOUND</code></p>
</body>
</html>
