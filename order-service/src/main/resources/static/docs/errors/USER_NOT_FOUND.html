<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>USER_NOT_FOUND</title>
    <style>
        body { font-family: Arial, sans-serif;
               margin: 40px; }
        h1 { color: #c00; }
        ul { margin-left: 20px; }
        code { background-color: #f2f2f2; padding: 2px 6px; border-radius: 4px; }
    </style>
</head>
<body>
<h1>USER_NOT_FOUND</h1>
<p>The requested user does not exist in the system.</p>
<p>Possible causes:</p>
<ul>
    <li>Invalid user ID</li>
    <li>User has been deleted</li>
    <li>Typo in the request</li>
</ul>
<p>HTTP Status: <code>404 NOT FOUND</code></p>
</body>
</html>
