syntax = "proto3";



option java_package = "com.eswar.grpc.user";
option java_multiple_files = true;

service UserService {
  // Get user by unique ID
  rpc GetUserById(UserIdRequest) returns (UserResponse);

  // Get user by email
  rpc GetUserByEmail(UserEmailRequest) returns (UserResponse);
}

// Request messages
message UserIdRequest {
  string id = 1;
}

message UserEmailRequest {
  string email = 1;
}

// Response message
message UserResponse {
  string id = 1;
  string email = 2;
  string name = 3;
  string password = 4;
  repeated string roles = 5; // roles associated with the user
}