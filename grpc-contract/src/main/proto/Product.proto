syntax = "proto3";

option java_package = "com.eswar.grpc.user";
option java_multiple_files = true;

service ProductService {

  rpc GetProduct (ProductRequest) returns (ProductResponse);

}

message ProductRequest {
  string productId = 1;
}

message ProductResponse {
  string productId = 1;
  string name = 2;
  double price = 3;
}